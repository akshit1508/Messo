<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Rate Today’s Food</title>
    <link rel="stylesheet" th:href="@{/css/main.css}">
<script src="/js/theme.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>
<body>

<nav class="navbar">
    <h2>Rate Food</h2>
    <a href="/student/dashboard">Back</a>
    <button onclick="toggleTheme()" style="background:none;border:none;color:white;font-size:18px;cursor:pointer">
    🌙
</button>

</nav>

<div class="container">
    <div class="form-box">
        <h3 th:text="${food.name}"></h3>

        <p class="error" th:if="${ratingExpired}">
            Rating window expired
        </p>

        <p class="success" th:if="${alreadyRated}">
            You already rated today
        </p>

        <form th:if="${!alreadyRated and !ratingExpired}"
      method="post"
      th:action="@{/student/rate}">


            <input type="hidden" name="foodId" th:value="${food.id}">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

            <select name="rating" required>
                <option value="">Select Rating</option>
                <option value="1">⭐</option>
                <option value="2">⭐⭐</option>
                <option value="3">⭐⭐⭐</option>
                <option value="4">⭐⭐⭐⭐</option>
                <option value="5">⭐⭐⭐⭐⭐</option>
            </select>

            <button>Submit Rating</button>
        </form>
    </div>
</div>


</body>
</html>
