<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Student Dashboard</title>
    <link rel="stylesheet" href="/css/premium.css">
</head>
<body>

<!-- ================= NAVBAR ================= -->
<div class="navbar">
    <h2>MESSO</h2>

    <div class="bell">
        🔔
        <span th:if="${unreadCount > 0}" th:text="${unreadCount}"></span>
    </div>
</div>

<!-- ================= DASHBOARD ================= -->
<div class="dashboard">
    <h1>Welcome 👋</h1>

    <!-- ================= MAIN CARDS ================= -->
    <div class="cards">

        <div class="card" onclick="location.href='/student/rate'">
            <h3>🍽 Rate Today’s Food</h3>
        </div>

        <div class="card" onclick="location.href='/student/poll'">
            <h3>🗳 Vote Tomorrow’s Food</h3>
        </div>

        <div class="card" onclick="location.href='/student/tomorrow'">
            <h3>📅 Tomorrow Menu</h3>
        </div>

        <div class="card" onclick="location.href='/student/announcements'">
            <h3>📢 Announcements</h3>
        </div>

        <a href="/student/complaint" class="card">
            <h3>📝 Complaint / Feedback</h3>
        </a>

    </div>

    <!-- ================= NOTIFICATIONS ================= -->
    <div class="notification-box" th:if="${notifications != null and notifications.size() > 0}">
        <h2>🔔 Notifications</h2>

        <div th:each="n : ${notifications}" class="notification-item">
            <span th:text="${n.message}"></span>

            <form th:action="@{/student/notification/delete/{id}(id=${n.id})}"
                  method="post">
                <input type="hidden"
                       th:name="${_csrf.parameterName}"
                       th:value="${_csrf.token}">
                <button class="delete-btn">❌</button>
            </form>
        </div>
    </div>

    <!-- ================= ANNOUNCEMENTS ================= -->
    <div class="announcement-box" th:if="${announcements != null and announcements.size() > 0}">
        <h2>📢 Latest Announcements</h2>

        <div th:each="a : ${announcements}" class="announcement">
            <h4 th:text="${a.title}"></h4>
            <p th:text="${a.message}"></p>

            <form th:action="@{/student/announcement/delete/{id}(id=${a.id})}"
                  method="post">
                <input type="hidden"
                       th:name="${_csrf.parameterName}"
                       th:value="${_csrf.token}">
                <button class="delete-btn">❌ Dismiss</button>
            </form>
        </div>
    </div>

</div>

</body>
</html>
