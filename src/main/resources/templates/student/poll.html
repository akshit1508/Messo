<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Food Poll</title>
    <link rel="stylesheet" th:href="@{/css/main.css}">
    <script src="/js/theme.js"></script>

</head>
<body>

<nav class="navbar">
    <h2>Vote</h2>
    <a href="/student/dashboard">Back</a>
    <button onclick="toggleTheme()" style="background:none;border:none;color:white;font-size:18px;cursor:pointer">
    🌙
</button>

</nav>

<div class="container">
    <div class="form-box">
        <h3>Vote for Tomorrow’s Food</h3>

        <p th:if="${message}" th:text="${message}"></p>

        <form th:if="${!alreadyVoted}" method="post" action="/student/poll/vote">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

            <div th:each="opt : ${poll.options}">
                <label>
                    <input type="radio" name="optionId" th:value="${opt.id}" required>
                    <span th:text="${opt.foodName}"></span>
                </label>
            </div>

            <button>Vote</button>
        </form>

        <p th:if="${alreadyVoted}">You have already voted</p>
    </div>
</div>


</body>
</html>
