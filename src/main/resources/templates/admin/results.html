<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Poll Results</title>
    <link rel="stylesheet" href="/css/main.css">
    <script src="/js/theme.js"></script>
</head>
<body>

<nav class="navbar">
    <a href="/admin/dashboard">⬅ Back</a>
    <a href="/logout">Logout</a>
    <button onclick="toggleTheme()" class="theme-btn">🌙</button>
</nav>

<div class="container">

    <div class="form-box">
        <h2>📊 Poll Results</h2>

        <p class="info-text" th:if="${message}" th:text="${message}"></p>

        <table class="result-table" th:if="${results}">
            <thead>
                <tr>
                    <th>Food Item</th>
                    <th>Votes</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="row : ${results}">
                    <td th:text="${row[0]}"></td>
                    <td th:text="${row[1]}"></td>
                </tr>
            </tbody>
        </table>

        <div th:if="${winner != null}" class="winner-box">
            🏆 Winning Food:
            <span th:text="${winner}"></span>
        </div>

        <form th:action="@{/admin/poll/publish}" method="post">
            <input type="hidden"
                   th:name="${_csrf.parameterName}"
                   th:value="${_csrf.token}" />

            <button class="btn-primary">
                ✅ Publish as Tomorrow’s Menu
            </button>
        </form>
    </div>

</div>

</body>
</html>
