<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Create Poll</title>
    <link rel="stylesheet" th:href="@{/css/main.css}">
    <script src="/js/theme.js"></script>

</head>
<body>

<nav class="navbar">
    <a href="/admin/dashboard">⬅ Back</a>
    <a href="/logout">Logout</a>
    <button onclick="toggleTheme()" style="background:none;border:none;color:white;font-size:18px;cursor:pointer">
    🌙
</button>

</nav>

<div class="content">
    <h2>Create Tomorrow’s Food Poll</h2>

    <form th:action="@{/admin/poll/create}" method="post">

        <!-- ✅ CSRF TOKEN (THIS FIXES 403) -->
        <input type="hidden"
               th:name="${_csrf.parameterName}"
               th:value="${_csrf.token}" />

        <input type="text" name="foods" placeholder="Food 1" required>
        <input type="text" name="foods" placeholder="Food 2" required>
        <input type="text" name="foods" placeholder="Food 3">

        <button type="submit">Create Poll</button>
    </form>
</div>

</body>
</html>
